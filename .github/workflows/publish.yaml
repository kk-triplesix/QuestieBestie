name: Build & Release
on:
  push:
    tags:
      - '*.*.*.*'

env:
  CI: true

jobs:
  Build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Tag Version
        run: |
          $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
          "tag=$tag" | Out-File -Append -FilePath $Env:GITHUB_ENV

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"
          Remove-Item dalamud.zip

      - name: Restore NuGet Packages
        run: dotnet restore QuestieBestie.csproj

      - name: Build Plugin
        run: |
          dotnet build --no-restore -c Release QuestieBestie.csproj `
            -p:AssemblyVersion=${{ env.tag }} `
            -p:FileVersion=${{ env.tag }} `
            -p:InformationalVersion=${{ env.tag }}

      - name: Find latest.zip
        id: find_zip
        run: |
          $zip = Get-ChildItem -Recurse -Filter "latest.zip" -Path . | Select-Object -First 1
          if (-not $zip) { throw "latest.zip not found" }
          Write-Host "Found: $($zip.FullName)"
          "zip_path=$($zip.FullName)" | Out-File -Append -FilePath $Env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_zip.outputs.zip_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and Push pluginmaster.json
        run: |
          $manifest = Get-Content "QuestieBestie.json" | ConvertFrom-Json
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/${{ env.tag }}/latest.zip"

          $manifest | Add-Member -NotePropertyName "AssemblyVersion" -NotePropertyValue "${{ env.tag }}"
          $manifest | Add-Member -NotePropertyName "TestingAssemblyVersion" -NotePropertyValue "${{ env.tag }}"
          $manifest | Add-Member -NotePropertyName "DownloadLinkInstall" -NotePropertyValue $downloadUrl
          $manifest | Add-Member -NotePropertyName "DownloadLinkUpdate" -NotePropertyValue $downloadUrl
          $manifest | Add-Member -NotePropertyName "DownloadLinkTesting" -NotePropertyValue $downloadUrl
          $manifest | Add-Member -NotePropertyName "DownloadCount" -NotePropertyValue 0
          $manifest | Add-Member -NotePropertyName "LastUpdated" -NotePropertyValue (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $pluginmaster = ConvertTo-Json @($manifest) -Depth 10

          New-Item -ItemType Directory -Path deploy -Force
          Set-Content -Path "deploy/pluginmaster.json" -Value $pluginmaster -Encoding UTF8

          Push-Location deploy
          git init -b repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Update QuestieBestie to ${{ env.tag }}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -f origin repo
          Pop-Location
